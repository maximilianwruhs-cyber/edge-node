x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # 1. Local Inference Engine (Ollama) — only starts with --profile local
  #    Not needed when using Gemini API cloud inference.
  ollama:
    profiles: ["local"]
    image: ollama/ollama:latest
    container_name: edgenode-ollama
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 2. Agent Orchestrator (OpenClaw) — Gemini 2.5 Flash via cloud API
  openclaw-gateway:
    build:
      context: .
      dockerfile: openclaw-build/Dockerfile
    container_name: edgenode-openclaw
    restart: unless-stopped
    logging: *default-logging
    network_mode: host                         # Direct host network for Telegram/Gemini access
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./core_identity:/workspace/core_identity
      - ./config:/root/.openclaw
      # Obsidian Vault mounted directly for the MCP Filesystem Server
      - ${OBSIDIAN_VAULT_PATH}:/workspace/Obsidian_Vault
      # QMD Hybrid Search: share host's index DB, GGUF models, and collection config
      - ${HOME}/.cache/qmd:/root/.cache/qmd
      - ${HOME}/.config/qmd:/root/.config/qmd
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - NODE_OPTIONS=--dns-result-order=ipv4first

volumes:
  ollama_data:
