---
# Edge Node — Zero-Touch Sovereign AI Node Provisioner
# Usage:
#   ansible-playbook -i inventory.yml deploy_node.yml --ask-become-pass
#
# With Ansible Vault for secrets:
#   ansible-playbook -i inventory.yml deploy_node.yml --ask-become-pass --ask-vault-pass

- name: Provision Sovereign AI Node
  hosts: sovereign_nodes
  become: true

  vars:
    edgenode_user: "{{ ansible_user }}"
    edgenode_home: "/home/{{ edgenode_user }}"
    edgenode_dir: "{{ edgenode_home }}/edge-node"
    models_dir: "{{ edgenode_home }}/.local/share/aos/models/qwen"

  roles:
    - role: baremetal
      tags: [infra]
    - role: models
      tags: [models]
    - role: edgenode
      tags: [deploy]
