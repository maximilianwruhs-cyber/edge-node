---
# Role: devstack — Deploy the Edge Node codebase and ignite

- name: Create Edge Node directory
  file:
    path: "{{ edgenode_dir }}"
    state: directory
    owner: "{{ edgenode_user }}"
    mode: "0755"

- name: Sync Edge Node codebase to target
  synchronize:
    src: "{{ playbook_dir }}/../"
    dest: "{{ edgenode_dir }}/"
    rsync_opts:
      - "--exclude=ansible"
      - "--exclude=.env"
      - "--exclude=.git"
  become: true
  become_user: "{{ edgenode_user }}"

- name: Template .env from Ansible Vault secrets
  template:
    src: edgenode.env.j2
    dest: "{{ edgenode_dir }}/.env"
    owner: "{{ edgenode_user }}"
    mode: "0600"

- name: Create Obsidian Vault directory (if missing)
  file:
    path: "{{ obsidian_vault_path }}"
    state: directory
    owner: "{{ edgenode_user }}"
    mode: "0755"

- name: Create OpenClaw cache directory
  file:
    path: "{{ edgenode_home }}/.openclaw/cache"
    state: directory
    owner: "{{ edgenode_user }}"
    mode: "0755"

- name: Make deploy.sh executable
  file:
    path: "{{ edgenode_dir }}/deploy.sh"
    mode: "0755"

- name: Ignite Edge Node
  become: true
  become_user: "{{ edgenode_user }}"
  shell: ./deploy.sh
  args:
    chdir: "{{ edgenode_dir }}"
  register: deploy_result

- name: Show deployment output
  debug:
    var: deploy_result.stdout_lines
